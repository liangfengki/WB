    // ====== 文件上传 ======
    function setupUpload() {
        const zone = document.getElementById('uploadZone');
        const input = document.getElementById('fileInput');

        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
        zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
        input.addEventListener('change', e => handleFiles(e.target.files));
    }

    // ====== 缓存持久化 ======
    function saveTaskToCache(taskId, files) {
        taskHistoryCache[taskId] = {
            files: files,
            timestamp: Date.now(),
        };
        localStorage.setItem(TASK_CACHE_KEY, JSON.stringify(taskHistoryCache));
    }

    function restoreCachedState() {
        // 恢复上传文件列表 —— 通过服务端API获取该session的已上传文件
        if (sessionId) {
            fetch(`/api/session-files/${sessionId}`)
                .then(resp => resp.json())
                .then(data => {
                    if (data.files && data.files.length > 0) {
                        uploadedFiles = data.files;
                        renderFileList();
                        updateStartButton();
                    } else {
                        // session 已无文件，清空本地缓存
                        uploadedFiles = [];
                        renderFileList();
                        updateStartButton();
                    }
                })
                .catch(() => {
                    // session 已失效
                    uploadedFiles = [];
                    renderFileList();
                    updateStartButton();
                });
        }

        // 恢复历史任务结果
        const historyKeys = Object.keys(taskHistoryCache);
        if (historyKeys.length === 0) return;

        let hasResults = false;
        for (const tid of historyKeys) {
            const cached = taskHistoryCache[tid];
            if (cached && cached.files && cached.files.length > 0) {
                hasResults = true;
                break;
            }
        }

        if (hasResults) {
            // 渲染所有缓存的历史任务结果
            renderAllCachedHistory();
        }
    }

    function renderAllCachedHistory() {
        const area = document.getElementById('resultArea');
        const actions = document.getElementById('resultActions');
        const countEl = document.getElementById('resultCount');

        let allFiles = [];
        for (const tid of Object.keys(taskHistoryCache)) {
            const cached = taskHistoryCache[tid];
            if (!cached || !cached.files || !cached.files.length) continue;

            // 为每个文件标记所属的 taskId，方便渲染时使用正确的 URL
            cached.files.forEach(f => {
                allFiles.push({ name: f.name || f, taskId: tid });
            });
        }

        if (allFiles.length === 0) {
            area.innerHTML = `<div class="empty-state"><i class="bi bi-image"></i><p>${t('no_results')}</p></div>`;
            actions.style.display = 'none';
            countEl.textContent = '0';
            return;
        }

        countEl.textContent = allFiles.length;
        actions.style.display = 'flex';

        // 构建灯箱图片列表
        const allLightboxImages = allFiles.map(item => ({
            src: `/api/output/${item.taskId}/${encodeURIComponent(item.name)}?license_key=${licenseKey}`,
            name: item.name
        }));

        // 按任务分组
        const groupsByTask = {};
        allFiles.forEach(item => {
            if (!groupsByTask[item.taskId]) groupsByTask[item.taskId] = [];
            groupsByTask[item.taskId].push(item);
        });

        let html = '<div class="result-groups">';
        let gi = 0;
        let globalIdx = 0; // 全局图片索引，用于灯箱定位
        for (const [tid, items] of Object.entries(groupsByTask)) {
            const gid = 'rg_' + gi;
            const firstItem = items[0];
            const firstFileName = firstItem.name;
            const thumbSrc = `/api/output/${tid}/${encodeURIComponent(firstFileName)}?license_key=${licenseKey}`;

            html += `
            <div class="result-group" id="${gid}">
                <div class="result-group-header" onclick="toggleResultGroup('${gid}')">
                    <img class="group-thumb lazy-placeholder" data-lazy="${thumbSrc}" alt="" loading="lazy"
                         onerror="this.onerror=null;this.style.background='var(--bg-hover)'">
                    <div class="group-info">
                        <div class="group-source-name">${escapeHtml(tid)} (${items.length} 张)</div>
                        <div class="group-count">任务 #${gi + 1}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button class="btn-icon" style="width:28px;height:28px;font-size:13px;opacity:1;visibility:visible;color:var(--primary);background:rgba(59,130,246,0.1);" onclick="event.stopPropagation();downloadTask('${tid}')" title="下载整个任务"><i class="bi bi-download"></i></button>
                        <button class="btn-icon" style="width:28px;height:28px;font-size:13px;opacity:1;visibility:visible;color:var(--danger);background:rgba(239,68,68,0.1);" onclick="event.stopPropagation();deleteTask('${tid}')" title="删除整个任务"><i class="bi bi-trash"></i></button>
                        <div class="group-toggle"><i class="bi bi-chevron-down"></i></div>
                    </div>
                </div>
                <div class="result-group-body">
                    <div class="result-grid">${items.map(item => {
                        const f = item.name;
                        const lbIdx = globalIdx++;
                        const safeName = escapeJsString(f);
                        return `
                        <div class="result-item" style="cursor:pointer" onclick="openLightbox(__allLbImgs, ${lbIdx})">
                            <img class="lazy-placeholder" data-lazy="/api/output/${tid}/${encodeURIComponent(f)}?license_key=${licenseKey}" alt="${escapeHtml(f)}" loading="lazy"
                                 onerror="this.onerror=null;this.parentElement.innerHTML='<div style=\\'padding:20px;color:var(--text-light);font-size:12px\\'>图片已过期</div>'">
                            <div class="result-actions">
                                <button class="btn-icon" style="width:26px;height:26px;font-size:11px;background:rgba(255,255,255,.9)" onclick="event.stopPropagation();downloadOne('${tid}','${safeName}')"><i class="bi bi-download"></i></button>
                                <button class="btn-icon" style="width:26px;height:26px;font-size:11px;background:rgba(255,255,255,.9)" onclick="event.stopPropagation();deleteOne('${tid}','${safeName}')"><i class="bi bi-trash"></i></button>
                            </div>
                            <div class="result-name">${escapeHtml(f)}</div>
                        </div>`;
                    }).join('')}
                    </div>
                </div>
            </div>`;
            gi++;
        }
        html += '</div>';
        area.innerHTML = html;

        // 将灯箱图片列表挂到全局变量
        window.__allLbImgs = allLightboxImages;

        // 懒加载
        area.querySelectorAll('img[data-lazy]').forEach(img => {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { img.src = img.dataset.lazy; obs.unobserve(img); } });
            });
            obs.observe(img);
        });
    }

    async function handleFiles(files) {
        if (!files.length) return;

        const formData = new FormData();
        const sessionIdField = sessionId || '';
        formData.append('session_id', sessionIdField);
        for (const f of files) formData.append('files', f);

        try {
            const reqHeaders = {};
            if (licenseKey) reqHeaders['X-License-Key'] = licenseKey;
            // 不能手动设置 Content-Type，让浏览器自动设置 multipart/form-data + boundary
            const resp = await fetch('/api/upload-preview', {
                method: 'POST',
                body: formData,
                credentials: 'same-origin',
                headers: reqHeaders,
            });
            // 授权失败 → 弹出授权码弹窗
            if (resp.status === 401 || resp.status === 403) { showLicenseModal(); return; }
            if (!resp.ok) {
                const errData = await resp.json().catch(() => ({}));
                alert(errData.error || `上传失败 (HTTP ${resp.status})`);
                return;
            }
            const data = await resp.json();
            if (data.error) { alert(data.error); return; }

            sessionId = data.session_id;
            inputDir = data.input_dir;
            uploadedFiles = data.files;
            // 持久化 session
            localStorage.setItem('session_id', sessionId);
            localStorage.setItem('input_dir', inputDir);
            renderFileList();
            updateStartButton();
        } catch (e) {
            console.error('上传失败:', e);
            alert('上传失败，请检查网络连接');
        }
    }

    function renderFileList() {
        const list = document.getElementById('fileList');
        document.getElementById('fileCount').textContent = uploadedFiles.length;

        if (!uploadedFiles.length) { list.innerHTML = ''; return; }

        list.innerHTML = uploadedFiles.map((f, idx) => {
            const thumbSrc = `/api/preview/${f.session_id || sessionId}/${encodeURIComponent(f.name)}?license_key=${licenseKey}`;
            const safeName = f.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            return `
            <div class="file-item">
                <img class="file-thumb" src="${thumbSrc}" alt="${escapeHtml(f.name)}" onerror="this.onerror=null;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2244%22 height=%2244%22><rect fill=%22%23f4f4f5%22 width=%2244%22 height=%2244%22/><text x=%2222%22 y=%2226%22 font-size=%2212%22 fill=%22%23a1a1aa%22 text-anchor=%22middle%22>📷</text></svg>'">
                <div class="file-info">
                    <div class="name">${escapeHtml(f.name)}</div>
                    <div class="size">${formatSize(f.size)}</div>
                </div>
                <button class="btn-icon" onclick="deleteFile(${idx})">✕</button>
            </div>
        `;
        }).join('');
    }

    async function deleteFile(idx) {
        const f = uploadedFiles[idx];
        if (!f) return;
        const headers = { 'Content-Type': 'application/json' };
        if (licenseKey) headers['X-License-Key'] = licenseKey;

        try {
            await fetch(`/api/upload/${sessionId}/${encodeURIComponent(f.name)}`, { method: 'DELETE', headers });
            uploadedFiles = uploadedFiles.filter((_, i) => i !== idx);
            renderFileList();
            updateStartButton();
        } catch (e) { console.error(e); }
    }

    // ====== 开始处理 ======
    function updateStartButton() {
        const btn = document.getElementById('startBtn');
        const canStart = licenseKey && uploadedFiles.length > 0;
        btn.disabled = !canStart;
        // 更新悬浮胶囊上的文件数量徽章
        const badge = document.getElementById('fabCountBadge');
        if (uploadedFiles.length > 0) {
            badge.textContent = uploadedFiles.length;
            badge.style.display = 'inline';
        } else {
            badge.style.display = 'none';
        }
    }

    async function startProcess() {
        if (!licenseKey) { showLicenseModal(); return; }
        if (!uploadedFiles.length) { alert(t('upload_first')); return; }

        const apiKey = document.getElementById('apiKeyInput').value.trim();
        const baseUrl = getBaseUrl();
        const model = document.getElementById('modelSelect').value;

        const prompt = document.getElementById('customPrompt').value.trim() || selectedScene || '';
        const imagesPerProduct = parseInt(document.getElementById('imagesPerProduct').value);

        const btn = document.getElementById('startBtn');
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-sm"></span> ${t('processing')}`;
        // 显示悬浮胶囊进度提示
        document.getElementById('fabProgressPill').classList.add('show');
        document.getElementById('fabProgressText').textContent = '准备中...';

        try {
            const resp = await fetch('/api/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-License-Key': licenseKey },
                body: JSON.stringify({
                    input_dir: inputDir,
                    prompt,
                    images_per_product: imagesPerProduct,
                    auto_recognize: autoRecognize,
                    api_key: apiKey,
                    base_url: baseUrl,
                    model: model,
                })
            });

            if (resp.status === 401 || resp.status === 403) {
                const data = await resp.json();
                alert(data.error || t('license_required'));
                showLicenseModal();
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-play-fill"></i><span>${t('start_process')}</span>`;
                document.getElementById('fabProgressPill').classList.remove('show');
                return;
            }

            const data = await resp.json();
            if (data.error) {
                alert(data.error);
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-play-fill"></i><span>${t('start_process')}</span>`;
                document.getElementById('fabProgressPill').classList.remove('show');
                return;
            }

            currentTaskId = data.task_id;
            document.getElementById('progressCard').style.display = 'block';
            pollTaskStatus();

        } catch (e) {
            alert('网络错误');
            btn.disabled = false;
            btn.innerHTML = `<i class="bi bi-play-fill"></i><span>${t('start_process')}</span>`;
            document.getElementById('fabProgressPill').classList.remove('show');
        }
    }

    async function pollTaskStatus() {
        if (!currentTaskId) return;

        try {
            const resp = await fetch(`/api/task/${currentTaskId}`, {
                headers: { 'X-License-Key': licenseKey }
            });
            const data = await resp.json();

            // 更新进度
            const prog = data.progress || {};
            const percent = prog.percent || 0;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').textContent = percent + '%';
            document.getElementById('progressDetail').textContent = prog.detail || '';
            // 同步进度到悬浮胶囊上方的进度提示
            const fabProgText = document.getElementById('fabProgressText');
            const fabProgPill = document.getElementById('fabProgressPill');
            if (percent > 0 && percent < 100) {
                fabProgText.textContent = `${prog.current_file || ''} ${prog.detail || ''} (${percent}%)`;
                fabProgPill.classList.add('show');
            } else {
                fabProgPill.classList.remove('show');
            }

            // 更新日志
            if (data.log && data.log.length) {
                document.getElementById('logList').innerHTML = data.log.slice(-20).map(l => `
                    <div class="log-item">
                        <span class="log-time">${l.time}</span>
                        <span class="log-status ${l.status}">${l.status}</span>
                        <span>${l.file} ${l.detail ? '- ' + l.detail : ''}</span>
                    </div>
                `).join('');
            }

            // 识别结果
            if (data.recognition && Object.keys(data.recognition).length) {
                const first = Object.values(data.recognition)[0];
                document.getElementById('recognitionCard').style.display = 'block';
                document.getElementById('recType').textContent = first.product_type;
                document.getElementById('recName').textContent = first.product_name;
            }

            if (data.status === 'completed' || data.status === 'failed') {
                clearInterval(pollTimer);
                const btn = document.getElementById('startBtn');
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-play-fill"></i><span>${t('start_process')}</span>`;
                // 清除悬浮胶囊进度提示
                document.getElementById('fabProgressPill').classList.remove('show');

                if (data.status === 'completed') {
                    const outputFiles = data.output_files || [];
                    // 保存结果到缓存
                    saveTaskToCache(currentTaskId, outputFiles);
                    // 合并渲染：重新渲染所有的历史结果
                    renderAllCachedHistory();
                } else {
                    alert(t('process_failed') + ': ' + (data.error || ''));
                }
                return;
            }

            pollTimer = setTimeout(pollTaskStatus, 2000);
        } catch (e) {
            pollTimer = setTimeout(pollTaskStatus, 3000);
        }
    }

    // ====== 结果展示（按源图分组） ======
    function renderResults(files, taskId) {
        const area = document.getElementById('resultArea');
        const actions = document.getElementById('resultActions');
        document.getElementById('resultCount').textContent = files.length;

        if (!files.length) {
            area.innerHTML = `<div class="empty-state"><i class="bi bi-image"></i><p>${t('no_results')}</p></div>`;
            actions.style.display = 'none';
            return;
        }

        actions.style.display = 'flex';

        // 按源图文件名分组：从输出文件名中提取源图名称
        // 输出格式通常为: 源图名_场景_序号.jpg 或类似
        const groups = {};
        files.forEach(f => {
            // 尝试从文件名中提取源图部分（去掉末尾的 _数字 后缀）
            let sourceName = f.replace(/_\d+\.[^.]+$/, '');  // 去掉 _1.jpg 等
            if (sourceName === f) {
                // 如果没匹配到，尝试其他模式
                sourceName = f.replace(/_[^_]+\.\w+$/, '');
            }
            if (!sourceName || sourceName === f) {
                sourceName = '未分类';
            }
            if (!groups[sourceName]) groups[sourceName] = [];
            groups[sourceName].push(f);
        });

        // 构建灯箱图片列表（扁平化所有图片）
        const allLightboxImages = files.map(f => ({
            src: `/api/output/${taskId}/${encodeURIComponent(f)}`,
            name: f
        }));

        // 渲染分组
        let html = '<div class="result-groups">';
        let groupIndex = 0;
        let globalIdx = 0; // 全局图片索引，用于灯箱定位
        for (const [sourceName, groupFiles] of Object.entries(groups)) {
            const gid = 'rg_' + groupIndex;
            // 用该组第一张结果图的路径作为缩略图
            const firstFile = groupFiles[0];
            const thumbSrc = `/api/output/${taskId}/${encodeURIComponent(firstFile)}`;
            html += `
            <div class="result-group" id="${gid}">
                <div class="result-group-header" onclick="toggleResultGroup('${gid}')">
                    <img class="group-thumb lazy-placeholder" data-lazy="${thumbSrc}" alt="" loading="lazy">
                    <div class="group-info">
                        <div class="group-source-name">${escapeHtml(sourceName)}</div>
                        <div class="group-count">${groupFiles.length} 张结果图</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button class="btn-icon" style="width:28px;height:28px;font-size:13px;opacity:1;visibility:visible;color:var(--primary);background:rgba(59,130,246,0.1);" onclick="event.stopPropagation();downloadTask('${taskId}')" title="下载整个任务"><i class="bi bi-download"></i></button>
                        <button class="btn-icon" style="width:28px;height:28px;font-size:13px;opacity:1;visibility:visible;color:var(--danger);background:rgba(239,68,68,0.1);" onclick="event.stopPropagation();deleteTask('${taskId}')" title="删除整个任务"><i class="bi bi-trash"></i></button>
                        <div class="group-toggle"><i class="bi bi-chevron-down"></i></div>
                    </div>
                </div>
                <div class="result-group-body">
                    <div class="result-grid">${groupFiles.map(f => {
                        const lbIdx = globalIdx++;
                        const safeName = f.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                        return `
                        <div class="result-item" style="cursor:pointer" onclick="openLightbox(__allLbImgs, ${lbIdx})">
                            <img class="lazy-placeholder" data-lazy="/api/output/${taskId}/${encodeURIComponent(f)}" alt="${escapeHtml(f)}" loading="lazy">
                            <div class="result-actions">
                                <button class="btn-icon" style="width:26px;height:26px;font-size:11px;background:rgba(255,255,255,.9)" onclick="event.stopPropagation();downloadOne('${taskId}','${safeName}')"><i class="bi bi-download"></i></button>
                            </div>
                            <div class="result-name">${escapeHtml(f)}</div>
                        </div>`;
                    }).join('')}</div>
                </div>
            </div>`;
            groupIndex++;
        }
        html += '</div>';
        area.innerHTML = html;

        // 将灯箱图片列表挂到全局变量
        window.__allLbImgs = allLightboxImages;

        // 懒加载图片
        area.querySelectorAll('img[data-lazy]').forEach(img => {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { img.src = img.dataset.lazy; obs.unobserve(img); } });
            });
            obs.observe(img);
        });
    }

    function toggleResultGroup(groupId) {
        document.getElementById(groupId).classList.toggle('collapsed');
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function escapeJsString(str) {
        return String(str)
            .replace(/\\/g, '\\\\')
            .replace(/'/g, "\\'")
            .replace(/\r/g, '\\r')
            .replace(/\n/g, '\\n');
    }

    function getLatestTaskId() {
        return Object.entries(taskHistoryCache)
            .sort((a, b) => (b[1]?.timestamp || 0) - (a[1]?.timestamp || 0))[0]?.[0] || null;
    }

    function downloadOne(taskId, filename) {
        const a = document.createElement('a');
        a.href = `/api/output/${taskId}/${encodeURIComponent(filename)}`;
        if (licenseKey) a.href += `?license_key=${licenseKey}`;
        a.download = filename;
        a.click();
    }

    async function deleteTask(taskId) {
        if (!confirm('确定要删除这个任务的所有结果图吗？')) return;
        try {
            const headers = { 'Content-Type': 'application/json' };
            if (licenseKey) headers['X-License-Key'] = licenseKey;
            const resp = await fetch(`/api/output/task/${taskId}`, {
                method: 'DELETE', headers
            });
            const data = await resp.json();
            if (data.success) {
                delete taskHistoryCache[taskId];
                localStorage.setItem(TASK_CACHE_KEY, JSON.stringify(taskHistoryCache));
                renderAllCachedHistory();
            } else {
                alert(data.error || '删除任务失败');
            }
        } catch (e) {
            alert('删除任务失败，请检查网络');
        }
    }

    async function deleteOne(taskId, filename) {
        if (!confirm('确定要删除这张图片吗？')) return;
        try {
            const headers = { 'Content-Type': 'application/json' };
            if (licenseKey) headers['X-License-Key'] = licenseKey;
            const resp = await fetch(`/api/output/${taskId}/${encodeURIComponent(filename)}`, {
                method: 'DELETE', headers
            });
            const data = await resp.json();
            if (data.success) {
                // 从缓存中移除
                const cached = taskHistoryCache[taskId];
                if (cached && cached.files) {
                    cached.files = cached.files.filter(f => (f.name || f) !== filename);
                    if (cached.files.length === 0) {
                        delete taskHistoryCache[taskId];
                    }
                    localStorage.setItem(TASK_CACHE_KEY, JSON.stringify(taskHistoryCache));
                }
                // 重新渲染
                renderAllCachedHistory();
            } else {
                alert(data.error || '删除失败');
            }
        } catch (e) {
            alert('删除失败，请检查网络');
        }
    }

    function downloadAll() {
        if (!currentTaskId) return;
        downloadTask(currentTaskId);
    }

    function downloadTask(taskId) {
        if (!taskId) return;
        const a = document.createElement('a');
        a.href = `/api/download/${taskId}`;
        if (licenseKey) a.href += `?license_key=${licenseKey}`;
        a.click();
    }

    // ====== 工具函数 ======
    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
    }

    // ====== 灯箱大图预览 ======
    let lightboxImages = [];  // [{src, name}]
    let lightboxIndex = 0;

    function openLightbox(images, startIndex) {
        lightboxImages = images;
        lightboxIndex = startIndex || 0;
        updateLightbox();
        const el = document.getElementById('lightbox');
        el.style.display = 'flex';
        requestAnimationFrame(() => el.classList.add('show'));
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        const el = document.getElementById('lightbox');
        el.classList.remove('show');
        setTimeout(() => { el.style.display = 'none'; }, 250);
        document.body.style.overflow = '';
    }

    function lightboxClose(event) {
        // 点击遮罩关闭（非图片区域）
        if (event.target === event.currentTarget) closeLightbox();
    }

    function updateLightbox() {
        if (!lightboxImages.length) return;
        const img = document.getElementById('lightboxImg');
        const item = lightboxImages[lightboxIndex];
        img.src = item.src;
        document.getElementById('lightboxFilename').textContent = item.name || '';
        document.getElementById('lightboxCounter').textContent = `${lightboxIndex + 1} / ${lightboxImages.length}`;
    }

    function lightboxPrev(event) {
        event.stopPropagation();
        if (lightboxImages.length <= 1) return;
        lightboxIndex = (lightboxIndex - 1 + lightboxImages.length) % lightboxImages.length;
        updateLightbox();
    }

    function lightboxNext(event) {
        event.stopPropagation();
        if (lightboxImages.length <= 1) return;
        lightboxIndex = (lightboxIndex + 1) % lightboxImages.length;
        updateLightbox();
    }

    // 键盘导航
    document.addEventListener('keydown', e => {
        const lb = document.getElementById('lightbox');
        if (lb.style.display !== 'flex') return;
        if (e.key === 'Escape') closeLightbox();
        else if (e.key === 'ArrowLeft') lightboxPrev(e);
        else if (e.key === 'ArrowRight') lightboxNext(e);
    });

    // ====== 悬浮胶囊二维码弹出 ======
    function toggleQrPopup(event) {
        event.stopPropagation();
        const popup = document.getElementById('fabQrPopup');
        popup.classList.toggle('show');
    }
    // 点击其他区域关闭二维码弹窗
    document.addEventListener('click', e => {
        const popup = document.getElementById('fabQrPopup');
        const wechat = document.getElementById('fabWechat');
        if (popup && !wechat.contains(e.target)) {
            popup.classList.remove('show');
        }
    });
    </script>
</body>
