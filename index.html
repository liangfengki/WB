<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varia - AI Background Replacement</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #FAFAFA;
            --bg-surface: #FFFFFF;
            --bg-hover: #F4F4F5;
            --text-main: #09090B;
            --text-muted: #71717A;
            --text-light: #A1A1AA;
            --border-color: #E4E4E7;
            --accent-color: #18181B;
            --accent-hover: #27272A;
            --success: #10B981;
            --danger: #EF4444;
            --info: #3B82F6;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --shadow-sm: 0 4px 12px rgba(0,0,0,.03);
            --shadow-md: 0 8px 24px rgba(0,0,0,.05);
            --shadow-lg: 0 20px 40px rgba(0,0,0,.08);
            --transition: all .3s cubic-bezier(.16,1,.3,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        /* 头部 */
        .app-header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 1020;
        }
        .app-header .container { max-width: 1280px; }
        .logo-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -.03em; }
        .logo-text p { font-size: 13px; color: var(--text-muted); margin: 0; }

        /* 授权码徽章 */
        .license-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px;
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: 100px; font-size: 13px; font-weight: 600;
            color: var(--text-muted); cursor: pointer;
            transition: var(--transition); box-shadow: var(--shadow-sm);
        }
        .license-badge:hover { border-color: var(--accent-color); color: var(--accent-color); }
        .license-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); }
        .license-badge.active .dot { background: var(--success); }
        .license-badge.active { color: var(--success); border-color: var(--success); }

        /* 卡片 */
        .app-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        .app-card:hover { box-shadow: var(--shadow-md); }
        .card-title {
            font-size: 16px; font-weight: 600; letter-spacing: -.01em;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 20px;
        }
        .card-title .badge-count {
            padding: 2px 10px; border-radius: 100px; font-size: 12px;
            font-weight: 600; background: var(--bg-hover); color: var(--text-muted);
        }

        /* 上传区域 */
        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-md);
            padding: 40px 20px;
            text-align: center; cursor: pointer;
            transition: var(--transition);
            position: relative; overflow: hidden;
            background: var(--bg-surface);
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent-color); background: var(--bg-hover);
        }
        .upload-zone .upload-icon { color: var(--text-muted); margin-bottom: 12px; font-size: 32px; }
        .upload-zone h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .upload-zone p { font-size: 13px; color: var(--text-muted); margin: 0; }
        .upload-zone input[type="file"] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer;
        }

        /* 文件列表 */
        .file-list { margin-top: 12px; max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .file-list::-webkit-scrollbar { width: 4px; }
        .file-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        .file-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px; border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            transition: var(--transition); background: var(--bg-surface);
            position: relative;
        }
        .file-item:hover { border-color: var(--accent-color); }
        .file-item:hover .btn-icon { opacity: 1; visibility: visible; }
        .file-thumb { width: 44px; height: 44px; border-radius: var(--radius-sm); object-fit: cover; background: var(--bg-hover); flex-shrink: 0; }
        .file-info { flex: 1; min-width: 0; }
        .file-info .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-info .size { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .btn-icon {
            width: 30px; height: 30px; border-radius: 50%; border: none;
            background: var(--bg-hover); color: var(--text-muted);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: var(--transition); font-size: 12px;
            opacity: 0; visibility: hidden; flex-shrink: 0;
        }
        .btn-icon:hover { background: var(--danger); color: #fff; }

        /* 开关 */
        .toggle-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; background: var(--bg-hover);
            border-radius: var(--radius-md); margin-bottom: 16px;
        }
        .toggle-info { flex: 1; }
        .toggle-title { font-size: 14px; font-weight: 600; }
        .toggle-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .toggle {
            position: relative; width: 44px; height: 24px;
            background: var(--border-color); border-radius: 100px;
            cursor: pointer; transition: var(--transition);
            flex-shrink: 0; margin-left: 12px;
        }
        .toggle.active { background: var(--success); }
        .toggle::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 20px; height: 20px; border-radius: 50%;
            background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2);
            transition: var(--transition);
        }
        .toggle.active::after { left: 22px; }

        /* 场景选择 */
        .scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .scene-chip {
            padding: 8px 14px; border-radius: 100px;
            border: 1px solid var(--border-color);
            font-size: 13px; font-weight: 500;
            cursor: pointer; transition: var(--transition);
            text-align: center; background: var(--bg-surface);
        }
        .scene-chip:hover { border-color: var(--accent-color); }
        .scene-chip.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }

        /* 按钮 */
        .btn-primary-app {
            background: var(--accent-color); color: #fff; border: none;
            border-radius: 12px; padding: 14px 28px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary-app:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-primary-app:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .btn-outline-app {
            background: transparent; color: var(--accent-color);
            border: 1px solid var(--border-color); border-radius: 12px;
            padding: 10px 20px; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: var(--transition);
        }
        .btn-outline-app:hover { border-color: var(--accent-color); }

        /* API 状态按钮（顶部导航） */
        .api-status-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 14px;
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: 100px; font-size: 13px; font-weight: 500;
            color: var(--text-muted); cursor: pointer;
            transition: var(--transition); box-shadow: var(--shadow-sm);
        }
        .api-status-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }
        .api-status-btn .api-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); }
        .api-status-btn.connected { color: var(--success); border-color: #86EFAC; background: #F0FDF4; }
        .api-status-btn.connected .api-dot { background: var(--success); }

        /* API 配置弹窗 */
        .api-config-modal .modal-content {
            border-radius: 20px; border: none; box-shadow: var(--shadow-lg);
            max-height: 90vh;
        }
        .api-config-modal .modal-body { padding: 20px 24px; overflow-y: auto; max-height: 65vh; }

        /* 中转站卡片网格 */
        .proxy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        @media (max-width: 575.98px) { .proxy-grid { grid-template-columns: repeat(2, 1fr); } }
        .proxy-card {
            border: 2px solid var(--border-color); border-radius: 14px;
            padding: 14px 16px; cursor: pointer; transition: all .2s;
            background: var(--bg-surface);
        }
        .proxy-card:hover { border-color: #A1A1AA; background: var(--bg-hover); }
        .proxy-card.selected { border-color: var(--accent-color); background: var(--bg-hover); box-shadow: 0 0 0 3px rgba(24,24,27,.08); }
        .proxy-card .pc-name { font-size: 14px; font-weight: 600; color: var(--text-main); line-height: 1.3; }
        .proxy-card .pc-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* 详情区域（选中后展开） */
        .api-detail-area {
            border-top: 1px solid var(--border-color); padding-top: 18px;
            animation: slideDown .25s ease;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .api-detail-area .detail-label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }

        /* API 协议选择按钮组 */
        .protocol-group { display: flex; gap: 8px; }
        .protocol-btn {
            flex: 1; padding: 10px 16px; border-radius: 12px; border: 2px solid var(--border-color);
            background: var(--bg-surface); font-size: 14px; font-weight: 600;
            cursor: pointer; text-align: center; transition: all .2s; color: var(--text-main);
        }
        .protocol-btn:hover { border-color: #A1A1AA; }
        .protocol-btn.active { border-color: var(--accent-color); background: var(--accent-color); color: #fff; }

        /* 底部操作按钮 */
        .api-action-row { display: flex; gap: 10px; margin-top: 8px; }
        .api-action-row .btn-test {
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color);
            background: var(--bg-surface); font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all .2s; color: var(--text-main);
        }
        .api-action-row .btn-test:hover { border-color: var(--text-muted); }
        .api-action-row .btn-save {
            flex: 2; padding: 12px; border-radius: 12px; border: none;
            background: var(--text-main); color: #fff; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all .2s;
        }
        .api-action-row .btn-save:hover { background: var(--accent-hover); }
        .api-action-row .btn-save:disabled { opacity: .45; cursor: not-allowed; }
        .api-cancel-btn {
            width: 100%; padding: 10px; border-radius: 12px; border: none;
            background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 500;
            cursor: pointer; margin-top: 6px; transition: all .2s;
        }
        .api-cancel-btn:hover { background: var(--bg-hover); }

        .form-control-app {
            border-radius: 12px; padding: 10px 14px;
            border: 1px solid var(--border-color);
            font-size: 14px; transition: var(--transition);
            width: 100%;
        }
        .form-control-app:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(24,24,27,.1); outline: none; }
        .form-select-app {
            border-radius: 12px; padding: 10px 14px;
            border: 1px solid var(--border-color);
            font-size: 14px; transition: var(--transition);
            width: 100%; background: #fff;
            cursor: pointer;
        }
        .form-select-app:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(24,24,27,.1); outline: none; }

        .custom-url-row { display: none; }
        .custom-url-row.show { display: block; }

        .check-api-btn {
            border-radius: 10px; padding: 10px 18px;
            font-size: 13px; font-weight: 600;
            background: var(--accent-color); color: #fff; border: none;
            cursor: pointer; transition: var(--transition);
            white-space: nowrap;
        }
        .check-api-btn:hover { background: var(--accent-hover); }
        .check-api-btn:disabled { opacity: .5; cursor: not-allowed; }

        /* 进度条 */
        .progress-app { height: 8px; border-radius: 100px; background: var(--bg-hover); overflow: hidden; }
        .progress-app .bar { height: 100%; background: var(--accent-color); border-radius: 100px; transition: width .5s ease; }

        /* 日志区域 */
        .log-list { max-height: 300px; overflow-y: auto; font-size: 12px; font-family: 'SF Mono','Fira Code',monospace; }
        .log-item { padding: 6px 0; border-bottom: 1px solid var(--bg-hover); display: flex; gap: 8px; align-items: flex-start; }
        .log-time { color: var(--text-light); white-space: nowrap; flex-shrink: 0; }
        .log-status { font-weight: 600; white-space: nowrap; flex-shrink: 0; }
        .log-status.completed { color: var(--success); }
        .log-status.failed { color: var(--danger); }
        .log-status.processing { color: var(--info); }

        /* 结果网格 - 按源图分组 */
        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }

        /* 分组容器 */
        .result-group { margin-bottom: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; background: var(--bg-surface); transition: var(--transition); }
        .result-group:hover { box-shadow: var(--shadow-sm); }
        .result-group-header {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; background: var(--bg-hover);
            cursor: pointer; user-select: none;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }
        .result-group-header:hover { background: #EBEBEB; }
        .result-group-header .group-thumb {
            width: 36px; height: 36px; border-radius: var(--radius-sm);
            object-fit: cover; border: 1px solid var(--border-color);
        }
        .result-group-header .group-info { flex: 1; min-width: 0; }
        .result-group-header .group-source-name {
            font-size: 13px; font-weight: 600; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .result-group-header .group-count {
            font-size: 11px; color: var(--text-muted); font-weight: 500;
        }
        .result-group-header .group-toggle {
            width: 24px; height: 24px; border-radius: 50%;
            background: var(--bg-surface); border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); flex-shrink: 0; color: var(--text-muted);
            font-size: 11px;
        }
        .result-group.collapsed .group-toggle { transform: rotate(-90deg); }
        .result-group.collapsed .result-group-body { display: none; }

        /* 分组内的结果网格 */
        .result-group-body { padding: 10px; }
        .result-item {
            border-radius: var(--radius-sm); overflow: hidden;
            border: 1px solid var(--border-color); transition: var(--transition);
            position: relative; background: var(--bg-hover);
        }
        .result-item:hover { box-shadow: var(--shadow-sm); transform: translateY(-2px); z-index: 1; }
        .result-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
        .result-item .result-name {
            padding: 6px 8px; font-size: 11px; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            background: var(--bg-surface);
        }
        .result-item .result-actions {
            position: absolute; top: 4px; right: 4px; display: flex; gap: 4px;
            opacity: 1; transition: opacity .2s;
        }
        .result-item .result-actions .btn-icon { opacity: 0.7; visibility: visible; }
        .result-item:hover .result-actions .btn-icon { opacity: 1; }

        /* 微信二维码 → 已集成至悬浮胶囊按钮 */

        /* 授权码输入弹窗 */
        .license-modal .modal-content {
            border-radius: 20px; border: none;
            box-shadow: var(--shadow-lg);
        }
        .license-modal .modal-body { padding: 32px; }
        .license-input {
            border-radius: 12px; padding: 12px 16px;
            border: 1px solid var(--border-color);
            font-family: 'SF Mono','Fira Code',monospace;
            font-size: 16px; letter-spacing: 1px; text-align: center;
        }
        .license-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(24,24,27,.1); }

        /* 空状态 */
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
        .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; }
        .empty-state p { font-size: 14px; }

        /* 语言切换 */
        .lang-switch {
            font-size: 12px; color: var(--text-muted); cursor: pointer;
            padding: 4px 8px; border-radius: 6px; transition: var(--transition);
        }
        .lang-switch:hover { background: var(--bg-hover); color: var(--text-main); }
        .lang-switch.active { color: var(--accent-color); font-weight: 600; }

        /* 识别结果 */
        .recognition-card {
            background: linear-gradient(135deg, #EFF6FF, #F0FDF4);
            border: 1px solid #BFDBFE; border-radius: var(--radius-md);
            padding: 16px; margin-top: 12px;
        }
        .recognition-card .rec-type { font-size: 18px; font-weight: 700; }
        .recognition-card .rec-name { font-size: 14px; color: var(--text-muted); }

        /* 懒加载图片占位 */
        .lazy-placeholder { background: var(--bg-hover); display: flex; align-items: center; justify-content: center; color: var(--text-light); }

        /* 响应式微调 */
        @media (max-width: 575.98px) {
            .app-card { padding: 20px; border-radius: var(--radius-md); }
            .result-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .scene-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* 加载动画 */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner-sm { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }

        /* 悬浮胶囊按钮 - 居中大号 ×1.5 */
        .fab-capsule {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            z-index: 1040;
            display: flex; align-items: center; gap: 0;
            background: rgba(255,255,255,.92); backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(0,0,0,.08);
            border-radius: 100px; padding: 10px 12px 10px 22px;
            box-shadow: 0 14px 48px rgba(0,0,0,.18), 0 6px 16px rgba(0,0,0,.1);
            transition: var(--transition);
        }
        .fab-capsule:hover { box-shadow: 0 20px 56px rgba(0,0,0,.24), 0 8px 20px rgba(0,0,0,.12); }
        .fab-count-badge {
            background: var(--accent-color); color: #fff;
            font-size: 18px; font-weight: 700; padding: 5px 16px;
            border-radius: 100px; margin-right: 14px;
        }
        .fab-select-wrap {
            position: relative; margin-right: 12px;
        }
        .fab-select-wrap select {
            appearance: none; -webkit-appearance: none;
            background: var(--bg-hover); border: none; border-radius: 14px;
            padding: 15px 44px 15px 18px; font-size: 20px; font-weight: 600;
            color: var(--text-main); cursor: pointer; outline: none;
            min-width: 100px; transition: var(--transition);
        }
        .fab-select-wrap select:hover { background: #E4E4E7; }
        .fab-select-wrap::after {
            content: ''; position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            border-left: 7px solid transparent; border-right: 7px solid transparent;
            border-top: 9px solid var(--text-muted); pointer-events: none;
        }
        .fab-capsule-btn {
            background: var(--accent-color); color: #fff; border: none;
            border-radius: 100px; padding: 20px 48px; min-width: 210px;
            font-size: 22px; font-weight: 600; cursor: pointer;
            transition: var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            white-space: nowrap;
        }
        .fab-capsule-btn:hover:not(:disabled) {
            background: var(--accent-hover); transform: scale(1.04);
            box-shadow: 0 8px 28px rgba(24,24,27,.35);
        }
        .fab-capsule-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
        .fab-capsule-btn .spinner-sm { width: 22px; height: 22px; border-width: 3px; }

        /* 悬浮胶囊内的微信二维码 */
        .fab-wechat {
            display: flex; align-items: center; gap: 12px;
            margin-right: 14px; padding-right: 20px;
            border-right: 1px solid var(--border-color);
            cursor: pointer; transition: var(--transition);
            position: relative;
        }
        .fab-wechat:hover .fab-qr-thumb { transform: scale(1.1); box-shadow: 0 6px 20px rgba(7,193,96,.3); }
        .fab-qr-thumb {
            width: 54px; height: 54px; border-radius: 12px;
            object-fit: cover; border: 1px solid rgba(0,0,0,.06);
            transition: var(--transition);
        }
        .fab-wechat-label {
            display: flex; flex-direction: column; line-height: 1.2;
        }
        .fab-wechat-label strong { font-size: 17px; font-weight: 600; color: var(--text-main); }
        .fab-wechat-label span { font-size: 14px; color: var(--text-muted); }

        /* 二维码弹出大图 */
        .fab-qr-popup {
            position: absolute; bottom: calc(100% + 16px); left: 0;
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 24px;
            box-shadow: 0 24px 72px rgba(0,0,0,.22), 0 10px 28px rgba(0,0,0,.12);
            display: none; flex-direction: column; align-items: center; gap: 14px;
            z-index: 1050; min-width: 260px;
            animation: qrPopupIn .25s cubic-bezier(.16,1,.3,1);
        }
        .fab-qr-popup.show { display: flex; }
        .fab-qr-popup img {
            width: 240px; height: 240px; border-radius: 16px;
            object-fit: cover; border: 1px solid var(--border-color);
        }
        .fab-qr-popup .qr-popup-text {
            font-size: 18px; font-weight: 600; color: var(--text-main);
            text-align: center; line-height: 1.4;
        }
        .fab-qr-popup .qr-popup-text small { font-weight: 400; color: var(--text-muted); display: block; font-size: 14px; margin-top: 4px; }
        .fab-qr-popup::after {
            content: ''; position: absolute; bottom: -8px; left: 38px;
            width: 16px; height: 16px; background: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            transform: rotate(45deg);
        }
        @keyframes qrPopupIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .fab-progress-pill {
            position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
            z-index: 1040;
            background: rgba(255,255,255,.92); backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 100px; padding: 12px 24px;
            box-shadow: 0 10px 32px rgba(0,0,0,.14);
            font-size: 18px; color: var(--info); font-weight: 600;
            white-space: nowrap; max-width: 400px;
            overflow: hidden; text-overflow: ellipsis;
            display: none; align-items: center; gap: 10px;
            animation: fabFadeIn .25s ease;
        }
        .fab-progress-pill.show { display: flex; }
        @keyframes fabFadeIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        @media (max-width: 575.98px) {
            .fab-capsule {
                left: 10px; right: 10px; transform: none;
                justify-content: center; padding: 8px 8px 8px 14px;
                bottom: 14px;
            }
            .fab-capsule-btn { padding: 16px 32px; font-size: 18px; min-width: 160px; }
            .fab-wechat-label { display: none; }
            .fab-qr-thumb { width: 40px; height: 40px; }
            .fab-select-wrap select { padding: 12px 36px 12px 14px; font-size: 17px; min-width: 80px; }
            .fab-count-badge { font-size: 15px; padding: 4px 12px; }
            .fab-progress-pill { left: 10px; right: 10px; transform: none; bottom: 100px; font-size: 15px; padding: 10px 20px; }
            @keyframes fabFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        }

        /* 灯箱（大图预览） */
        .lightbox-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,.88); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity .25s ease;
        }
        .lightbox-overlay.show { display: flex; opacity: 1; }
        .lightbox-overlay img {
            max-width: 92vw; max-height: 88vh;
            border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.5);
            object-fit: contain; cursor: grab;
            user-select: none; -webkit-user-drag: none;
        }
        .lightbox-close {
            position: absolute; top: 20px; right: 24px;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
            color: #fff; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); z-index: 10;
        }
        .lightbox-close:hover { background: rgba(255,255,255,.25); transform: scale(1.1); }
        .lightbox-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
            color: #fff; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); z-index: 10;
        }
        .lightbox-nav:hover { background: rgba(255,255,255,.25); transform: translateY(-50%) scale(1.1); }
        .lightbox-nav.prev { left: 20px; }
        .lightbox-nav.next { right: 20px; }
        .lightbox-counter {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,.5); border-radius: 100px; padding: 6px 16px;
            color: rgba(255,255,255,.8); font-size: 13px; font-weight: 500;
            backdrop-filter: blur(4px);
        }
        .lightbox-filename {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,.5); border-radius: 100px; padding: 6px 16px;
            color: rgba(255,255,255,.8); font-size: 12px; font-weight: 500;
            max-width: 60vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <header class="app-header">
        <div class="container d-flex align-items-center justify-content-between py-3">
            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center gap-3">
                    <img src="/static/logo.png" alt="Varia" style="height:38px;width:auto;object-fit:contain">
                    <div class="logo-text">
                        <h1>Varia</h1>
                        <p data-i18n="subtitle">AI Background Replacement</p>
                    </div>
                </div>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span class="lang-switch active" data-lang="zh" onclick="setLang('zh')">中</span>
                <span class="lang-switch" data-lang="en" onclick="setLang('en')">EN</span>
                <span class="lang-switch" data-lang="ru" onclick="setLang('ru')">RU</span>
                <div id="apiStatusBtn" class="api-status-btn ms-1" onclick="showApiModal()">
                    <span class="api-dot"></span>
                    <span id="apiStatusTextNav">API 未配置</span>
                    <i class="bi bi-gear" style="font-size:11px;margin-left:2px;opacity:.5"></i>
                </div>
                <div id="licenseBadge" class="license-badge ms-2" onclick="showLicenseModal()">
                    <span class="dot"></span>
                    <span data-i18n="license_not_set">未设置授权码</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="container" style="max-width:1280px">
        <div class="row g-3 g-lg-4 py-4">
            <!-- 左列：上传 + 设置 -->
            <div class="col-12 col-lg-6">
                <!-- 上传区域 -->
                <div class="app-card mb-3">
                    <div class="card-title">
                        <i class="bi bi-cloud-upload"></i>
                        <span data-i18n="upload_title">上传产品图</span>
                        <span class="badge-count" id="fileCount">0</span>
                    </div>
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-icon"><i class="bi bi-image"></i></div>
                        <h3 data-i18n="upload_hint">拖拽图片到此处或点击上传</h3>
                        <p data-i18n="upload_formats">支持 JPG、PNG、WebP 格式</p>
                        <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.webp">
                    </div>
                    <div class="file-list" id="fileList"></div>
                </div>

                <!-- 场景设置 -->
                <div class="app-card mb-3">
                    <div class="card-title">
                        <i class="bi bi-palette"></i>
                        <span data-i18n="scene_title">场景设置</span>
                    </div>
                    <!-- 自动识别开关 -->
                    <div class="toggle-row">
                        <div class="toggle-info">
                            <div class="toggle-title" data-i18n="auto_recognize">🤖 AI 自动识别产品</div>
                            <div class="toggle-desc" data-i18n="auto_recognize_desc">自动识别产品类型并匹配最佳场景</div>
                        </div>
                        <div class="toggle" id="autoRecognizeToggle" onclick="toggleAutoRecognize()"></div>
                    </div>
                    <!-- 预设场景 -->
                    <div class="scene-grid" id="sceneGrid"></div>
                    <!-- 自定义提示词 -->
                    <div class="mt-3">
                        <label class="form-label fw-medium" style="font-size:13px" data-i18n="custom_prompt">自定义场景描述</label>
                        <textarea id="customPrompt" class="form-control" rows="3" style="border-radius:12px;font-size:14px" placeholder="描述你想要的背景风格..." data-i18n-placeholder="custom_prompt_placeholder"></textarea>
                    </div>
                </div>

                <!-- 生成数量 + 开始处理 → 已移至底部悬浮栏 -->
            </div>

            <!-- 右列：进度 + 结果 -->
            <div class="col-12 col-lg-6">
                <!-- 处理进度 -->
                <div class="app-card mb-3" id="progressCard" style="display:none">
                    <div class="card-title">
                        <i class="bi bi-hourglass-split"></i>
                        <span data-i18n="progress_title">处理进度</span>
                    </div>
                    <div class="progress-app mb-2">
                        <div class="bar" id="progressBar" style="width:0%"></div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-muted" style="font-size:13px" id="progressText">0%</span>
                        <span class="text-muted" style="font-size:13px" id="progressDetail"></span>
                    </div>
                    <!-- 日志 -->
                    <div class="log-list" id="logList"></div>
                </div>

                <!-- 识别结果 -->
                <div id="recognitionCard" class="recognition-card mb-3" style="display:none">
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <i class="bi bi-robot" style="font-size:18px"></i>
                        <span class="rec-type" id="recType"></span>
                    </div>
                    <div class="rec-name" id="recName"></div>
                </div>

                <!-- 处理结果 -->
                <div class="app-card">
                    <div class="card-title d-flex justify-content-between align-items-center w-100">
                        <div class="d-flex align-items-center gap-2">
                            <i class="bi bi-grid"></i>
                            <span data-i18n="result_title">处理结果</span>
                            <span class="badge-count" id="resultCount">0</span>
                        </div>
                        <div class="d-flex gap-2" id="resultActions" style="display:none">
                            <button class="btn-outline-app" style="padding:6px 14px;font-size:12px" onclick="downloadAll()">
                                <i class="bi bi-download me-1"></i><span data-i18n="download_all">下载全部</span>
                            </button>
                        </div>
                    </div>
                    <div id="resultArea">
                        <div class="empty-state">
                            <i class="bi bi-image"></i>
                            <p data-i18n="no_results">处理结果将在此处显示</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 灯箱大图预览 -->
    <div class="lightbox-overlay" id="lightbox" onclick="lightboxClose(event)">
        <div class="lightbox-filename" id="lightboxFilename"></div>
        <button class="lightbox-close" onclick="closeLightbox()"><i class="bi bi-x-lg"></i></button>
        <button class="lightbox-nav prev" onclick="lightboxPrev(event)"><i class="bi bi-chevron-left"></i></button>
        <img id="lightboxImg" src="" alt="Preview" onclick="event.stopPropagation()">
        <button class="lightbox-nav next" onclick="lightboxNext(event)"><i class="bi bi-chevron-right"></i></button>
        <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>

    <!-- 悬浮胶囊按钮（居中大号） -->
    <div class="fab-progress-pill" id="fabProgressPill">
        <span class="spinner-sm" style="width:12px;height:12px;border-width:1.5px;border-top-color:var(--info)"></span>
        <span id="fabProgressText"></span>
    </div>
    <div class="fab-capsule" id="fabCapsule">
        <!-- 微信二维码区域 -->
        <div class="fab-wechat" id="fabWechat" onclick="toggleQrPopup(event)">
            <img class="fab-qr-thumb" src="/static/wechat-qr.png" alt="微信">
            <div class="fab-wechat-label">
                <strong data-i18n="wechat_title">添加微信咨询</strong>
                <span data-i18n="wechat_desc">专业电商产品图处理</span>
            </div>
            <!-- 二维码弹出大图 -->
            <div class="fab-qr-popup" id="fabQrPopup">
                <img src="/static/wechat-qr.png" alt="微信二维码">
                <div class="qr-popup-text">
                    扫码添加微信
                    <small data-i18n="wechat_desc">专业电商产品图处理</small>
                </div>
            </div>
        </div>
        <span class="fab-count-badge" id="fabCountBadge" style="display:none">0</span>
        <div class="fab-select-wrap">
            <select id="imagesPerProduct">
                <option value="1">1张</option>
                <option value="2">2张</option>
                <option value="3" selected>3张</option>
                <option value="5">5张</option>
                <option value="8">8张</option>
            </select>
        </div>
        <button class="fab-capsule-btn" id="startBtn" onclick="startProcess()" disabled>
            <i class="bi bi-play-fill"></i><span data-i18n="start_process">开始生成</span>
        </button>
    </div>

    <!-- 授权码弹窗 -->
    <div class="modal fade license-modal" id="licenseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <h4 class="fw-bold mb-1">🔐</h4>
                    <h5 class="fw-bold mb-3" data-i18n="license_modal_title">输入授权码</h5>
                    <div id="licenseError" class="alert alert-danger d-none py-2" style="font-size:13px"></div>
                    <div id="licenseSuccess" class="alert alert-success d-none py-2" style="font-size:13px"></div>
                    <input type="text" id="licenseInput" class="license-input w-100 mb-3" placeholder="WB-XXXXXXXXXXXX" maxlength="15">
                    <button class="btn-primary-app w-100 mb-2" onclick="activateLicense()">
                        <span data-i18n="activate">激活</span>
                    </button>
                    <button class="btn-outline-app w-100" onclick="requestTrial()" style="font-size:13px;padding:10px">
                        <span data-i18n="request_trial">申请试用授权码</span>
                    </button>
                    <p class="text-muted mt-3 mb-0" style="font-size:11px" data-i18n="trial_hint">试用授权码有效期7天，每日限10次</p>
                </div>
            </div>
        </div>
    </div>

    <!-- API 配置弹窗 -->
    <div class="modal fade api-config-modal" id="apiConfigModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header border-0 pb-2 px-4 pt-4">
                    <h5 class="modal-title fw-bold">API 配置</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-1 px-4 pb-3">
                    <!-- 中转站卡片选择 -->
                    <div style="margin-bottom:16px">
                        <label class="detail-label">选择 API 中转站</label>
                    </div>
                    <div class="proxy-grid" id="proxyGrid"></div>

                    <!-- 选中后展开的详情区域 -->
                    <div id="apiDetailArea" class="api-detail-area" style="display:none">
                        <!-- 显示名称 -->
                        <div class="mb-3">
                            <div class="detail-label">显示名称</div>
                            <input type="text" id="apiDisplayName" class="form-control-app" readonly style="background:var(--bg-hover);cursor:default">
                        </div>

                        <!-- API Key -->
                        <div class="mb-3">
                            <div class="detail-label">API Key <span style="color:var(--danger)">*</span></div>
                            <input type="password" id="apiKeyInput" class="form-control-app" placeholder="sk-xxxxxxxxxxxxxxxx">
                        </div>

                        <!-- 模型名称 -->
                        <div class="mb-3">
                            <div class="detail-label">模型名称</div>
                            <input type="text" id="modelSelect" class="form-control-app" placeholder="输入模型名称，如 gemini-2.5-flash-preview-05-20">
                        </div>

                        <!-- Base URL（只读显示） -->
                        <div class="mb-3">
                            <div class="detail-label">Base URL</div>
                            <input type="text" id="baseUrlDisplay" class="form-control-app" readonly style="background:var(--bg-hover);cursor:default;font-size:13px;color:var(--text-muted)">
                        </div>

                        <!-- 自定义 URL（仅自定义时显示） -->
                        <div class="mb-3 custom-url-row" id="customUrlRow" style="display:none">
                            <div class="detail-label">自定义地址</div>
                            <input type="text" id="customUrl" class="form-control-app" placeholder="https://your-proxy.com/v1">
                        </div>

                        <!-- API 协议 -->
                        <div class="mb-3">
                            <div class="detail-label">API 协议</div>
                            <div class="protocol-group">
                                <button class="protocol-btn active" id="protocolOpenAI" onclick="setProtocol('openai')">OpenAI</button>
                                <button class="protocol-btn" id="protocolGoogle" onclick="setProtocol('google')">Google API</button>
                            </div>
                        </div>

                        <!-- 验证结果 -->
                        <div id="apiCheckResult" class="mb-3" style="font-size:12px;font-weight:600;display:none"></div>

                        <!-- 操作按钮行 -->
                                <button class="btn-save" id="saveApiBtn" onclick="saveAndVerify()">保存配置</button>
                            </div>
                            <button class="api-cancel-btn" onclick="closeApiModal()">取消</button>
                    </div>

                    <!-- 未选择时的提示 -->
                    <div id="apiEmptyTip" class="text-center py-4" style="color:var(--text-light);font-size:14px">
                        请先选择一个 API 中转站
                    </div>
                </div>
            </div>
        </div>
    </div>

    let currentLang = localStorage.getItem('lang') || 'zh';

        document.querySelectorAll('.lang-switch').forEach(el => el.classList.toggle('active', el.dataset.lang === lang));
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            if (i18n[lang][key]) el.textContent = i18n[lang][key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.dataset.i18nPlaceholder;
            if (i18n[lang][key]) el.placeholder = i18n[lang][key];
        });
    }

    function t(key) { return i18n[currentLang][key] || key; }

    // ====== 全局状态 ======
    let licenseKey = localStorage.getItem('license_key') || '';
    let sessionId = localStorage.getItem('session_id') || '';
    let inputDir = localStorage.getItem('input_dir') || '';
    let uploadedFiles = [];
    let currentTaskId = null;
    let autoRecognize = false;
    let selectedScene = '';
    let pollTimer = null;
    let proxySites = []; // 中转站列表缓存
    let apiConnected = false; // API 连接状态

    const TASK_CACHE_KEY = 'varia_task_history';
    let taskHistoryCache = JSON.parse(localStorage.getItem(TASK_CACHE_KEY) || '{}');

    // ====== 初始化 ======
    document.addEventListener('DOMContentLoaded', () => {
        setLang(currentLang);
        loadScenes();
        updateLicenseUI();
        updateStartButton();
        setupUpload();
        restoreApiConfig();
        if (licenseKey) {
            loadProxySites();
        }
        restoreCachedState();  // 恢复缓存的文件列表和历史结果

        // 懒加载图片
        if ('IntersectionObserver' in window) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        const img = e.target;
                        if (img.dataset.lazy) { img.src = img.dataset.lazy; observer.unobserve(img); }
                    }
                });
            });
            document.querySelectorAll('img[data-lazy]').forEach(img => observer.observe(img));
        }
    });

    // ====== 中转站配置（卡片式） ======
    let selectedProxyId = '';
    let selectedProtocol = 'openai';

    async function loadProxySites() {
        try {
            const resp = await fetch('/api/proxy-sites');
            const data = await resp.json();
            proxySites = data.sites || [];
            renderProxyCards();
            // 恢复已保存的选择
            const savedSite = localStorage.getItem('proxy_site_id');
            if (savedSite) selectProxyCard(savedSite);
        } catch (e) { console.error('加载中转站列表失败:', e); }
    }

    function renderProxyCards() {
        const grid = document.getElementById('proxyGrid');
        grid.innerHTML = proxySites.map(site => `
            <div class="proxy-card" id="proxy_${site.id}" onclick="selectProxyCard('${site.id}')">
                <div class="pc-name">${site.name}</div>
                <div class="pc-desc">${site.description || ''}</div>
            </div>
        `).join('');
    }

    function selectProxyCard(siteId) {
        selectedProxyId = siteId;
        // 更新卡片选中状态
        document.querySelectorAll('.proxy-card').forEach(c => c.classList.remove('selected'));
        const selectedEl = document.getElementById('proxy_' + siteId);
        if (selectedEl) selectedEl.classList.add('selected');

        // 显示详情区域，隐藏空提示
        document.getElementById('apiDetailArea').style.display = 'block';
        document.getElementById('apiEmptyTip').style.display = 'none';

        // 填充站点信息
        const site = proxySites.find(s => s.id === siteId);
        if (!site) return;

        document.getElementById('apiDisplayName').value = site.name;
        document.getElementById('baseUrlDisplay').value = site.base_url;

        // 自定义站点显示 URL 输入框
        const customRow = document.getElementById('customUrlRow');
        if (siteId === 'custom') {
            customRow.style.display = 'block';
            document.getElementById('baseUrlDisplay').value = '自定义 API 端点';
        } else {
            customRow.style.display = 'none';
        }

        // 模型输入框：直接填入
        const modelInput = document.getElementById('modelSelect');

        // 恢复已保存的值
        const savedKey = localStorage.getItem('api_key') || '';
        const savedModel = localStorage.getItem('api_model') || '';
        const savedCustomUrl = localStorage.getItem('custom_url') || '';
        document.getElementById('apiKeyInput').value = savedKey;
        if (savedModel) modelInput.value = savedModel;
        if (savedCustomUrl) document.getElementById('customUrl').value = savedCustomUrl;

        // 隐藏之前的验证结果
        document.getElementById('apiCheckResult').style.display = 'none';
    }

    function setProtocol(proto) {
        selectedProtocol = proto;
        document.querySelectorAll('.protocol-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(proto === 'openai' ? 'protocolOpenAI' : 'protocolGoogle').classList.add('active');
    }

    function getBaseUrl() {
        if (selectedProxyId === 'custom') {
            return document.getElementById('customUrl').value.trim();
        }
        const site = proxySites.find(s => s.id === selectedProxyId);
        return site ? site.base_url : '';
    }

    function saveApiConfig() {
        localStorage.setItem('proxy_site_id', selectedProxyId);
        localStorage.setItem('custom_url', document.getElementById('customUrl').value.trim());
        localStorage.setItem('api_key', document.getElementById('apiKeyInput').value.trim());
        localStorage.setItem('api_model', document.getElementById('modelSelect').value);
        localStorage.setItem('api_protocol', selectedProtocol);
        apiConnected = false;
        updateApiStatus();
        updateStartButton();
    }

    function restoreApiConfig() {
        const savedSite = localStorage.getItem('proxy_site_id') || '';
        const savedKey = localStorage.getItem('api_key') || '';
        const savedProto = localStorage.getItem('api_protocol') || 'openai';
        setProtocol(savedProto);

        if (savedSite && proxySites.length > 0) {
            selectProxyCard(savedSite);
        }
        if (savedKey && savedSite) {
            apiConnected = true;
            updateApiStatus();
        }
    }

    async function testConnection() {
        const apiKey = document.getElementById('apiKeyInput').value.trim();
        const baseUrl = getBaseUrl();

        if (!apiKey) { alert('请输入 API Key'); return; }
        if (!baseUrl) { alert('请先选择中转站'); return; }

        const resultEl = document.getElementById('apiCheckResult');
        resultEl.style.display = 'block';
        resultEl.innerHTML = '<span style="color:#F59E0B">&#9203; 测试连接中...</span>';

        try {
            const headers = { 'Content-Type': 'application/json' };
            if (licenseKey) headers['X-License-Key'] = licenseKey;
            const resp = await fetch('/api/check-api', {
                method: 'POST',
                headers,
                body: JSON.stringify({ api_key: apiKey, base_url: baseUrl, protocol: selectedProtocol })
            });
            const data = await resp.json();
            if (data.valid) {
                resultEl.innerHTML = '<span style="color:#10B981">&#10003; 连接成功！</span>';
            } else {
                resultEl.innerHTML = '<span style="color:#EF4444">&#10007; ' + (data.message || '连接失败') + '</span>';
            }
        } catch (e) {
            resultEl.innerHTML = '<span style="color:#EF4444">&#10007; 网络错误</span>';
        }
    }

    async function saveAndVerify() {
        const apiKey = document.getElementById('apiKeyInput').value.trim();
        const baseUrl = getBaseUrl();

        if (!selectedProxyId) { alert('请选择一个 API 中转站'); return; }
        if (!apiKey) { alert('请输入 API Key'); return; }
        if (!baseUrl && selectedProxyId !== 'custom') { alert('该中转站地址无效'); return; }

        const saveBtn = document.getElementById('saveApiBtn');
        const resultEl = document.getElementById('apiCheckResult');
        saveBtn.disabled = true;
        saveBtn.textContent = '保存中...';
        resultEl.style.display = 'block';
        resultEl.innerHTML = '<span style="color:#F59E0B">&#9203; 正在验证...';

        saveApiConfig(); // 先保存

        try {
            const headers = { 'Content-Type': 'application/json' };
            if (licenseKey) headers['X-License-Key'] = licenseKey;
            const resp = await fetch('/api/check-api', {
                method: 'POST',
                headers,
                body: JSON.stringify({ api_key: apiKey, base_url: baseUrl, protocol: selectedProtocol })
            });
            const data = await resp.json();
            if (data.valid) {
                apiConnected = true;
                updateApiStatus();
                resultEl.innerHTML = '<span style="color:#10B981">&#10003; 配置已保存，API 连接成功！</span>';
                setTimeout(() => closeApiModal(), 1200);
            } else {
                apiConnected = false;
                updateApiStatus();
                resultEl.innerHTML = '<span style="color:#EF4444">&#10007; 已保存但验证失败: ' + (data.message || '') + '</span>';
            }
        } catch (e) {
            resultEl.innerHTML = '<span style="color:#10B981">&#10003; 配置已保存（网络不可用，跳过验证）</span>';
            setTimeout(() => closeApiModal(), 800);
        }

        saveBtn.disabled = false;
        saveBtn.textContent = '保存配置';
        updateStartButton();
    }

    function closeApiModal() {
        const m = bootstrap.Modal.getInstance(document.getElementById('apiConfigModal'));
        if (m) m.hide();
    }

    function updateApiStatus() {
        const btn = document.getElementById('apiStatusBtn');
        const text = document.getElementById('apiStatusTextNav');
        if (apiConnected) {
            btn.classList.add('connected');
            text.textContent = t('api_connected');
        } else {
            btn.classList.remove('connected');
            text.textContent = t('api_not_configured');

    // ====== 授权码 ======
    function showLicenseModal() {
        document.getElementById('licenseError').classList.add('d-none');
        document.getElementById('licenseSuccess').classList.add('d-none');
        document.getElementById('licenseInput').value = licenseKey;
        new bootstrap.Modal(document.getElementById('licenseModal')).show();
    }

    async function activateLicense() {
        const code = document.getElementById('licenseInput').value.trim().toUpperCase();
        if (!code) return;

        const errEl = document.getElementById('licenseError');
        const succEl = document.getElementById('licenseSuccess');
        errEl.classList.add('d-none');
        succEl.classList.add('d-none');

        try {
            const resp = await fetch('/api/license/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ license_key: code })
            });
            const data = await resp.json();
            if (data.valid) {
                licenseKey = code;
                localStorage.setItem('license_key', code);
                succEl.textContent = '✅ ' + data.reason;
                succEl.classList.remove('d-none');
                updateLicenseUI();
                setTimeout(() => bootstrap.Modal.getInstance(document.getElementById('licenseModal')).hide(), 1000);
            } else {
                errEl.textContent = '❌ ' + data.reason;
                errEl.classList.remove('d-none');
            }
        } catch (e) {
            errEl.textContent = '网络错误，请重试';
            errEl.classList.remove('d-none');
        }
    }

    async function requestTrial() {
        const errEl = document.getElementById('licenseError');
        const succEl = document.getElementById('licenseSuccess');
        errEl.classList.add('d-none');

        try {
            const resp = await fetch('/api/license/trial', { method: 'POST' });
            const data = await resp.json();
            if (data.license_key) {
                licenseKey = data.license_key;
                localStorage.setItem('license_key', licenseKey);
                document.getElementById('licenseInput').value = licenseKey;
                succEl.textContent = `✅ 试用授权码已生成: ${licenseKey}`;
                succEl.classList.remove('d-none');
                updateLicenseUI();
                await loadProxySites();
                restoreApiConfig();
            } else {
                errEl.textContent = '❌ ' + (data.error || '申请失败');
                errEl.classList.remove('d-none');
            }
        } catch (e) {
            errEl.textContent = '网络错误，请重试';
            errEl.classList.remove('d-none');
        }
    }
